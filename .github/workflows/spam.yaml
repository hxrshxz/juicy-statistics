name: Create PR on Commit

on: [push]

jobs:
  create_pr:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write # Needed to push a new branch
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Create and push a new branch
        run: |
          BRANCH_NAME="automated-pr-${{ github.sha }}"
          git checkout -b $BRANCH_NAME
          git push origin $BRANCH_NAME

      - name: Create Pull Request using REST API
        run: |
          curl --request POST \
          --url https://api.github.com/repos/${{ github.repository }}/pulls \
          --header "authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
          --header "content-type: application/json" \
          --data '{
            "title": "Automated PR for commit: ${{ github.sha }}",
            "body": "This PR was automatically created by the GitHub Action workflow **${{ github.workflow }}**.",
            "head": "'$BRANCH_NAME'",
            "base": "main"
          }' \
          --fail
